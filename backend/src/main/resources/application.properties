spring.application.name=devpulse-api
server.port=${PORT:8080}

# Choose one database. Defaults are MySQL placeholders.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/devpulse?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:devpulse_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:devpulse_password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# PostgreSQL example:
# spring.datasource.url=jdbc:postgresql://localhost:5432/devpulse
# spring.datasource.username=devpulse_user
# spring.datasource.password=devpulse_password
# spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

app.jwt.secret=${JWT_SECRET:devpulse-local-development-secret-key-32}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# Optional GitHub token for private repos or higher rate limits.
github.token=${GITHUB_TOKEN:}
