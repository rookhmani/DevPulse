services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: devpulse
      MYSQL_USER: devpulse_user
      MYSQL_PASSWORD: devpulse_password
      MYSQL_ROOT_PASSWORD: devpulse_root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdevpulse_root_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/devpulse?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: devpulse_user
      SPRING_DATASOURCE_PASSWORD: devpulse_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      JWT_SECRET: change-this-devpulse-production-secret-please
      CORS_ALLOWED_ORIGIN: http://localhost:3000
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql-data:
